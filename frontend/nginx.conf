server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router support: unknown paths serve index.html,
    # then React's client-side router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the backend service.
    # "backend" is the Docker Compose service name — Docker's internal DNS
    # resolves it to the backend container's IP automatically.
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}